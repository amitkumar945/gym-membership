<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone Gym • Membership Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-3 header-glow" href="#">
                <i class="bi bi-dumbbell me-2" style="color:#00ff88;"></i> FitZone Gym
            </a>
            <div class="d-flex align-items-center">
                <span class="badge bg-success me-3 px-3 py-2"><i class="bi bi-database me-1"></i>MongoDB Connected</span>
                <span class="text-light small">Haridwar, Uttarakhand</span>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="display-5 fw-bold header-glow">Gym Membership Management</h1>
            <button onclick="openAddModal()" class="btn btn-primary btn-lg px-5">
                <i class="bi bi-person-plus me-2"></i>Add New Member
            </button>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4" id="statsRow"></div>

        <!-- Table -->
        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h5 class="fw-bold"><i class="bi bi-people me-2"></i>All Members <span id="totalCount" class="text-success">(0)</span></h5>
                <input type="text" id="searchInput" onkeyup="filterTable()" class="form-control w-25" placeholder="🔎 Search by name or trainer...">
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="membersTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Plan</th>
                            <th>Joining Date</th>
                            <th>Trainer</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add / Edit Modal -->
    <div class="modal fade" id="memberModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalTitle">Add New Member</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="memberForm">
                        <input type="hidden" id="memberId">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" id="age" class="form-control" min="12" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Membership Plan</label>
                                <select id="plan" class="form-select" required>
                                    <option value="Monthly">Monthly</option>
                                    <option value="Quarterly">Quarterly</option>
                                    <option value="Yearly">Yearly</option>
                                    <option value="Annual">Annual</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Joining Date</label>
                                <input type="date" id="joiningDate" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Trainer Name</label>
                                <input type="text" id="trainer" class="form-control" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button onclick="saveMember()" class="btn btn-primary px-5">Save to MongoDB</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
